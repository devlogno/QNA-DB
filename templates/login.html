{% extends "layout.html" %}

{% block title %}Login{% endblock %}

{% block content %}
<div class="flex flex-col items-center justify-center min-h-screen text-center -mt-16">
    <div class="bg-gray-900 p-8 rounded-lg shadow-xl border border-gray-700
                dark:bg-gray-950 dark:border-gray-800 transition-colors duration-300">
        <h2 class="text-3xl font-bold text-gray-100 mb-6">Login</h2>
        <form method="POST" action="{{ url_for('auth.login') }}"> {# FIX: Changed to 'auth.login' #}
            <div class="mb-4 text-left">
                <label for="username" class="block text-gray-300 text-sm font-bold mb-2">Username</label>
                <input type="text" id="username" name="username" required
                       class="shadow appearance-none border border-gray-600 rounded-lg w-full py-3 px-4 text-gray-100 leading-tight focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent bg-gray-700
                              dark:bg-gray-800 dark:border-gray-700">
            </div>
            <div class="mb-6 text-left">
                <label for="password" class="block text-gray-300 text-sm font-bold mb-2">Password</label>
                <input type="password" id="password" name="password" required
                       class="shadow appearance-none border border-gray-600 rounded-lg w-full py-3 px-4 text-gray-100 leading-tight focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent bg-gray-700
                              dark:bg-gray-800 dark:border-gray-700">
            </div>
            <div class="flex items-center justify-between">
                <button type="submit"
                        class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-6 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-opacity-50 transition-colors duration-200 w-full">
                    Sign In
                </button>
            </div>
        </form>
        <p class="text-sm text-gray-400 mt-6">
            Don't have an account? <a href="{{ url_for('auth.register') }}" class="text-blue-400 hover:underline">Register here</a> {# This was already correct, but ensuring it's here #}
        </p>
    </div>
</div>
{% endblock %}
