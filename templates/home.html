<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome to Question Bank</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts - Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0f172a; /* Always dark background */
            color: #e2e8f0; /* Default text color for dark mode */
        }
        @keyframes fade-in-down {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes fade-in-up {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in-down {
            animation: fade-in-down 0.8s ease-out forwards;
        }
        .animate-fade-in-up {
            animation: fade-in-up 0.8s ease-out forwards;
        }
        .delay-200 { animation-delay: 0.2s; }
    </style>
</head>
<body class="flex flex-col h-screen items-center justify-center dark">
    <div class="flex flex-col items-center justify-center text-center">
        <h1 class="text-5xl font-extrabold text-white mb-6 animate-fade-in-down">
            Question Everything. Master Anything.
        </h1>
        <p class="text-xl text-gray-300 mb-10 max-w-2xl animate-fade-in-up">
            Your ultimate resource for board questions, MCQs, and CQs. Prepare smarter, not harder.
        </p>
        <div class="flex space-x-4 animate-fade-in-up delay-200">
            {% if not current_user.is_authenticated %}
            <a href="{{ url_for('auth.login') }}" class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-8 rounded-lg shadow-lg transition-all duration-300 transform hover:scale-105 focus:outline-none focus:ring-4 focus:ring-blue-500 focus:ring-opacity-50">
                Login
            </a>
            <a href="{{ url_for('auth.register') }}" class="bg-green-600 hover:bg-green-700 text-white font-bold py-3 px-8 rounded-lg shadow-lg transition-all duration-300 transform hover:scale-105 focus:outline-none focus:ring-4 focus:ring-green-500 focus:ring-opacity-50">
                Register
            </a>
            {% else %}
            <a href="{{ url_for('routes.dashboard') }}" class="bg-purple-600 hover:bg-purple-700 text-white font-bold py-3 px-8 rounded-lg shadow-lg transition-all duration-300 transform hover:scale-105 focus:outline-none focus:ring-4 focus:ring-purple-500 focus:ring-opacity-50">
                Go to Dashboard
            </a>
            {% endif %}
        </div>
    </div>
</body>
</html>
